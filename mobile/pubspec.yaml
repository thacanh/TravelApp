name: trawime
description: Ứng dụng du lịch Việt Nam với AI

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  lucide_icons: ^0.257.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.2
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  flutter_polyline_points: ^2.0.0

  # Image Handling
  image_picker: ^1.0.7
  carousel_slider: ^5.0.0
  photo_view: ^0.14.0
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.3
  uuid: ^4.3.3
  flutter_launcher_icons: ^0.13.1
  flutter_dotenv: ^5.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#00BCD4"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
